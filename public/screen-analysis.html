<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Screen Analysis - xracing dashboard</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          colors: {
            racing: {
              red: '#E53935',
              dark: '#0D1117',
              darker: '#010409',
              card: '#161B22',
              border: '#30363D',
              text: '#C9D1D9',
              muted: '#8B949E'
            }
          }
        }
      }
    }
  </script>
  <style>
    body {
      background: linear-gradient(135deg, #0D1117 0%, #010409 100%);
      min-height: 100vh;
    }
    .glass-card {
      background: rgba(22, 27, 34, 0.8);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(48, 54, 61, 0.5);
    }
    .screen-card {
      background: linear-gradient(145deg, rgba(22, 27, 34, 0.9), rgba(13, 17, 23, 0.9));
      border: 1px solid rgba(48, 54, 61, 0.6);
      transition: all 0.2s ease;
    }
    .screen-card:hover {
      border-color: rgba(229, 57, 53, 0.5);
      transform: translateY(-2px);
    }
    .screen-card.expanded {
      border-color: rgba(229, 57, 53, 0.8);
    }
    .action-bar {
      height: 6px;
      background: rgba(48, 54, 61, 0.3);
      border-radius: 3px;
      overflow: hidden;
    }
    .action-bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.3s ease;
    }
  </style>
</head>
<body class="font-sans text-racing-text">
  <!-- Sidebar -->
  <button id="sidebarToggle" class="sidebar-toggle">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
    </svg>
  </button>
  <div id="sidebarOverlay" class="sidebar-overlay"></div>
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <a href="/">
        <img src="/logo_red.svg" alt="xracing" class="h-8 w-auto">
      </a>
    </div>
    <nav class="sidebar-nav">
      <a href="/">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
        </svg>
        <span>Home</span>
      </a>
      <a href="/live.html">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.636 18.364a9 9 0 010-12.728m12.728 0a9 9 0 010 12.728m-9.9-2.829a5 5 0 010-7.07m7.072 0a5 5 0 010 7.07M13 12a1 1 0 11-2 0 1 1 0 012 0z"/>
        </svg>
        <span>Live</span>
      </a>
      <a href="/analytics.html">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
        </svg>
        <span>Analytics</span>
      </a>
      <a href="/kpis.html">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 8v8m-4-5v5m-4-2v2m-2 4h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
        </svg>
        <span>KPIs</span>
      </a>
      <a href="/tables.html">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M3 14h18m-9-4v8m-7 0h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/>
        </svg>
        <span>Tables</span>
      </a>
      <a href="/user-timeline.html">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <span>User Timeline</span>
      </a>
      <a href="/screen-analysis.html" class="active">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 5a1 1 0 011-1h14a1 1 0 011 1v2a1 1 0 01-1 1H5a1 1 0 01-1-1V5zM4 13a1 1 0 011-1h6a1 1 0 011 1v6a1 1 0 01-1 1H5a1 1 0 01-1-1v-6zM16 13a1 1 0 011-1h2a1 1 0 011 1v6a1 1 0 01-1 1h-2a1 1 0 01-1-1v-6z"/>
        </svg>
        <span>Screen Analysis</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      xracing dashboard
    </div>
  </aside>

  <!-- Main Content -->
  <div class="main-content">
    <!-- Header -->
    <header class="page-header">
      <div class="page-header-content">
        <div class="flex items-center gap-4">
          <h1 class="page-title">Screen Analysis</h1>
        </div>
        <button onclick="refreshData()" class="px-4 py-2 bg-racing-card hover:bg-racing-border text-sm rounded-lg transition-colors">
          Refresh
        </button>
      </div>
    </header>

    <main class="page-content">
      <!-- Loading State -->
      <div id="loading" class="flex items-center justify-center py-20">
        <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-racing-red"></div>
      </div>

      <!-- Dashboard Content -->
      <div id="dashboard" class="hidden">
        <!-- Filters -->
        <div class="glass-card rounded-xl p-4 mb-6">
          <div class="flex flex-wrap items-center gap-4">
            <!-- Date Range Filter -->
            <div class="flex items-center gap-2">
              <label class="text-sm text-racing-muted">Period:</label>
              <select id="daysFilter" onchange="onDaysFilterChange()"
                class="px-3 py-2 bg-racing-dark border border-racing-border rounded-lg text-white text-sm focus:outline-none focus:border-racing-red">
                <option value="7">Last 7 days</option>
                <option value="14">Last 14 days</option>
                <option value="30" selected>Last 30 days</option>
                <option value="60">Last 60 days</option>
                <option value="90">Last 90 days</option>
              </select>
            </div>

            <!-- Username Filter -->
            <div class="flex items-center gap-2">
              <label class="text-sm text-racing-muted">User:</label>
              <div class="relative min-w-[200px]">
                <input type="text" id="usernameFilter" placeholder="All users"
                  class="w-full px-3 py-2 bg-racing-dark border border-racing-border rounded-lg text-white placeholder-racing-muted focus:outline-none focus:border-racing-red text-sm"
                  autocomplete="off">
              </div>
              <button id="clearUserBtn" onclick="clearUserFilter()" class="hidden text-racing-muted hover:text-white transition-colors p-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
              </button>
            </div>

            <!-- Exclude Owners Toggle -->
            <div class="flex items-center gap-2 ml-auto">
              <label for="excludeOwners" class="text-sm text-racing-muted cursor-pointer">Exclude owners</label>
              <button id="excludeOwnersToggle" onclick="toggleExcludeOwners()"
                class="relative w-11 h-6 bg-racing-border rounded-full transition-colors focus:outline-none">
                <span id="excludeOwnersKnob" class="absolute left-1 top-1 w-4 h-4 bg-racing-muted rounded-full transition-transform"></span>
              </button>
            </div>
          </div>
        </div>

        <!-- Summary Stats -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
          <div class="glass-card rounded-xl p-4 text-center">
            <p class="text-racing-muted text-xs mb-1">Total Screens</p>
            <p id="totalScreens" class="text-2xl font-bold text-white">-</p>
          </div>
          <div class="glass-card rounded-xl p-4 text-center">
            <p class="text-racing-muted text-xs mb-1">Total Events</p>
            <p id="totalEventsCount" class="text-2xl font-bold text-racing-red">-</p>
          </div>
          <div class="glass-card rounded-xl p-4 text-center">
            <p class="text-racing-muted text-xs mb-1">Unique Actions</p>
            <p id="uniqueActions" class="text-2xl font-bold text-white">-</p>
          </div>
          <div class="glass-card rounded-xl p-4 text-center">
            <p class="text-racing-muted text-xs mb-1">Avg Events/Screen</p>
            <p id="avgEventsPerScreen" class="text-2xl font-bold text-white">-</p>
          </div>
        </div>

        <!-- Screen Cards Grid -->
        <div id="screensGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
          <!-- Screen cards will be inserted here -->
        </div>
      </div>

      <!-- Screen Detail Modal -->
      <div id="screenModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="glass-card rounded-xl max-w-2xl w-full max-h-[80vh] overflow-hidden">
          <div class="p-6 border-b border-racing-border flex items-center justify-between">
            <div>
              <h2 id="modalScreenName" class="text-xl font-semibold text-white">-</h2>
              <p class="text-sm text-racing-muted">Action breakdown</p>
            </div>
            <button onclick="closeModal()" class="p-2 hover:bg-racing-border rounded-lg transition-colors">
              <svg class="w-5 h-5 text-racing-muted" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
              </svg>
            </button>
          </div>
          <div class="p-6 overflow-y-auto max-h-[60vh]">
            <div id="modalLoading" class="flex items-center justify-center py-10">
              <div class="animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-racing-red"></div>
            </div>
            <div id="modalContent" class="hidden">
              <div class="flex gap-6 mb-6">
                <div class="text-center">
                  <p class="text-2xl font-bold text-blue-400" id="modalScreenViews">-</p>
                  <p class="text-xs text-racing-muted">Screen Views</p>
                </div>
                <div class="text-center">
                  <p class="text-2xl font-bold text-white" id="modalTotalEvents">-</p>
                  <p class="text-xs text-racing-muted">Total Events</p>
                </div>
                <div class="text-center">
                  <p class="text-2xl font-bold text-green-400" id="modalTotalUsers">-</p>
                  <p class="text-xs text-racing-muted">Unique Users</p>
                </div>
              </div>
              <h3 class="text-sm font-medium text-white mb-3">All Actions</h3>
              <div id="modalActions" class="space-y-3">
                <!-- Actions will be inserted here -->
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="/js/shared.js"></script>
  <script src="/js/screen-analysis.js"></script>
</body>
</html>
